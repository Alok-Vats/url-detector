<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Phishing Detector{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1>Cloud-Based AI System for Phishing Detection</h1>
        <p>Phase 1 setup: Flask, SQLite, and a simple URL scanning interface.</p>
        <nav class="site-nav">
          <a href="{{ url_for('main.index') }}">Analyze URL</a>
          <a href="{{ url_for('main.history') }}">Scan History</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
